<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradiente de fundo principal -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a30" />
      <stop offset="60%" stop-color="#050e1b" />
      <stop offset="100%" stop-color="#02060d" />
    </linearGradient>
    
    <!-- Efeitos de Bokeh/Luzes desfocadas -->
    <radialGradient id="bokeh-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="bokeh-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="bokeh-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
    
    <!-- Filtro de desfoque gaussiano para simular bokeh de câmera -->
    <filter id="blur-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>

  <!-- Fundo principal -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Formas de Luzes Desfocadas (Simulando telas e luzes da sala de aula) -->
  <g filter="url(#blur-heavy)">
    <!-- Luzes no topo/esquerda -->
    <circle cx="200" cy="150" r="300" fill="url(#bokeh-blue)" />
    <circle cx="600" cy="100" r="250" fill="url(#bokeh-cyan)" />
    
    <!-- Luzes no centro/direita (onde fica o card, simulando iluminação por trás) -->
    <circle cx="1100" cy="300" r="400" fill="url(#bokeh-green)" />
    <circle cx="900" cy="500" r="350" fill="url(#bokeh-blue)" />
    
    <!-- Luzes na base -->
    <circle cx="300" cy="700" r="280" fill="url(#bokeh-cyan)" />
    <circle cx="1300" cy="750" r="300" fill="url(#bokeh-green)" />
  </g>

  <!-- Elementos geométricos de grade de perspectiva desfocada, simulando fileiras de sala de aula -->
  <path d="M 0,200 L 1440,300 M 0,400 L 1440,480 M 0,600 L 1440,650" stroke="#ffffff" stroke-opacity="0.015" stroke-width="2" />
  <path d="M 100,0 L 200,800 M 500,0 L 550,800 M 900,0 L 920,800 M 1300,0 L 1280,800" stroke="#ffffff" stroke-opacity="0.01" stroke-width="1.5" />
</svg>
