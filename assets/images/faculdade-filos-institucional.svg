<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#07162c" />
  <!-- Greek pillars facade representing "Filos" (philosophy/academy) -->
  <g transform="translate(150, 200)" stroke="#c29d53" fill="none" stroke-width="4">
    <!-- Pediment (triangle roof) -->
    <polygon points="150,0 0,60 300,60" />
    <!-- Architrave -->
    <rect x="15" y="60" width="270" height="20" fill="#c29d53" />
    <!-- Columns -->
    <line x1="50" y1="80" x2="50" y2="280" stroke-width="8" />
    <line x1="116" y1="80" x2="116" y2="280" stroke-width="8" />
    <line x1="183" y1="80" x2="183" y2="280" stroke-width="8" />
    <line x1="250" y1="80" x2="250" y2="280" stroke-width="8" />
    <!-- Base -->
    <rect x="5" y="280" width="290" height="30" fill="#c29d53" />
  </g>
  <text x="300" y="580" font-family="'Montserrat', sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">FACULDADE FILOS</text>
  <text x="300" y="620" font-family="'Inter', sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">Águas Lindas de Goiás</text>
</svg>