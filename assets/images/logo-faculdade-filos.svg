<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#aa7c11" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon: Monogram F Shield -->
  <g transform="translate(10, 10)">
    <!-- Shield Outline -->
    <path d="M 40,0 
             C 65,0 80,10 80,35 
             C 80,65 55,80 40,80 
             C 25,80 0,65 0,35 
             C 0,10 15,0 40,0 Z" 
          fill="#07162c" 
          stroke="url(#goldGradient)" 
          stroke-width="3" />
    
    <!-- Monogram F inside Shield -->
    <path d="M 28,22 L 56,22 L 56,30 L 38,30 L 38,42 L 50,42 L 50,50 L 38,50 L 38,62 L 28,62 Z" 
          fill="url(#goldGradient)" />
    
    <!-- Shield Accent Line -->
    <path d="M 40,3 Q 65,12 70,35" 
          fill="none" 
          stroke="url(#goldGradient)" 
          stroke-width="1.5" 
          stroke-linecap="round" 
          opacity="0.7" />
  </g>

  <!-- Typography -->
  <g transform="translate(105, 0)">
    <!-- FACULDADE -->
    <text x="0" y="42" 
          font-family="'Montserrat', 'Times New Roman', serif" 
          font-weight="400" 
          font-size="16" 
          fill="#94a3b8" 
          letter-spacing="9">FACULDADE</text>
    
    <!-- FILOS -->
    <text x="0" y="80" 
          font-family="'Playfair Display', 'Georgia', serif" 
          font-weight="800" 
          font-size="42" 
          fill="#07162c" 
          letter-spacing="2">FILOS</text>
  </g>
</svg>
